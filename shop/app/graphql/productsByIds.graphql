query ProductsByIds($locale: LocaleInputType!, $ids: [Int!]!) {
  Products(locale: $locale, where: { id: { in: $ids } }, limit: 100) {
    docs {
      id
      title
      slug
      priceInEUR
      inventory
      enableVariants
      gallery {
        id
        url
        thumbnailURL
      }
      variants {
        docs {
          id
          title
          priceInEUR
          inventory
        }
      }
    }
  }
}
